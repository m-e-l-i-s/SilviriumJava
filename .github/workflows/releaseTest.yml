name: Release Mod

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build mod
        run: |
          chmod +x ./gradlew
          ./gradlew deploy

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar